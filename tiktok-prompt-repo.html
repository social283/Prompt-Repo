<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dista — TikTok Prompt Repository</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.16);
    --text: #f0ede8;
    --muted: #888;
    --accent: #c8f56a;
    --accent-dim: rgba(200,245,106,0.12);
    --accent-exp: #f5a623;
    --accent-exp-dim: rgba(245,166,35,0.12);
    --green: #4ade80;
    --green-dim: rgba(74,222,128,0.1);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.1);
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,0.1);
    --radius: 10px;
    --radius-sm: 6px;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Layout */
  .shell { max-width: 960px; margin: 0 auto; padding: 0 24px 80px; }

  /* Header */
  .site-header {
    padding: 32px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
  }
  .logo-row { display: flex; align-items: center; gap: 12px; }
  .logo-mark {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-size: 16px; font-weight: 700;
    color: #0d0d0d;
    flex-shrink: 0;
  }
  .site-title { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--text); }
  .site-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* Stats bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 32px;
  }
  .stat-tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-val { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-tile.s-approved .stat-val { color: var(--green); }
  .stat-tile.s-rejected .stat-val { color: var(--red); }
  .stat-tile.s-inprog .stat-val { color: var(--amber); }

  /* Section label */
  .section-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Product cards */
  .product-grid { display: flex; flex-direction: column; gap: 16px; }
  .product-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .product-card.has-videos { border-color: rgba(200,245,106,0.2); }
  .product-card-header {
    padding: 16px 20px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    border-bottom: 1px solid var(--border);
  }
  .product-brand {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 4px;
    font-weight: 500;
  }
  .product-name { font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .product-desc { font-size: 11px; color: var(--muted); line-height: 1.5; }
  .product-actions { display: flex; gap: 8px; flex-shrink: 0; padding-top: 2px; }

  /* Buttons */
  button {
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    line-height: 1;
  }
  button:hover { border-color: var(--border-hover); background: var(--surface2); }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-gen { border-color: rgba(200,245,106,0.3); color: var(--accent); }
  .btn-gen:hover { background: var(--accent-dim); border-color: rgba(200,245,106,0.6); }
  .btn-exp { border-color: rgba(245,166,35,0.3); color: var(--accent-exp); }
  .btn-exp:hover { background: var(--accent-exp-dim); border-color: rgba(245,166,35,0.6); }
  .btn-approve { border-color: rgba(74,222,128,0.3); color: var(--green); font-size: 11px; padding: 5px 10px; }
  .btn-approve:hover { background: var(--green-dim); }
  .btn-reject { border-color: rgba(248,113,113,0.3); color: var(--red); font-size: 11px; padding: 5px 10px; }
  .btn-reject:hover { background: var(--red-dim); }
  .btn-regen { border-color: rgba(251,191,36,0.3); color: var(--amber); font-size: 11px; padding: 5px 10px; }
  .btn-regen:hover { background: var(--amber-dim); }
  .btn-copy { font-size: 10px; padding: 4px 8px; color: var(--muted); margin-top: 8px; }
  .btn-copy:hover { color: var(--text); }
  .btn-copy.copied { color: var(--green); border-color: rgba(74,222,128,0.3); }

  /* Videos list */
  .videos-list { padding: 0; }
  .video-block {
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    animation: fadeIn 0.3s ease;
  }
  .video-block.experimental { border-left: 2px solid var(--accent-exp); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .video-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
  .video-format { font-family: var(--font-display); font-size: 14px; font-weight: 600; color: var(--text); }
  .badges { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

  /* Badges */
  .badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: 0.04em;
    border: 1px solid transparent;
  }
  .badge-exp { background: var(--accent-exp-dim); color: var(--accent-exp); border-color: rgba(245,166,35,0.25); }
  .badge-draft { background: var(--surface2); color: var(--muted); border-color: var(--border); }
  .badge-approved { background: var(--green-dim); color: var(--green); border-color: rgba(74,222,128,0.25); }
  .badge-rejected { background: var(--red-dim); color: var(--red); border-color: rgba(248,113,113,0.25); }
  .badge-inprog { background: var(--amber-dim); color: var(--amber); border-color: rgba(251,191,36,0.25); }

  /* Status select */
  .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  select {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 5px 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
  }
  select:hover { border-color: var(--border-hover); }

  /* Scenes */
  .scenes-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .scene-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
  }
  .scene-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .scene-num {
    font-size: 10px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .scene-mode-pill {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 20px;
    background: var(--surface2);
    color: var(--accent);
    border: 1px solid rgba(200,245,106,0.2);
  }
  .scene-prompt { font-size: 12px; color: var(--text); line-height: 1.65; }

  /* Feedback */
  .feedback-section { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 4px; }
  .feedback-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  textarea {
    width: 100%;
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    resize: vertical;
    min-height: 64px;
    line-height: 1.6;
    outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: var(--border-hover); }
  textarea::placeholder { color: var(--muted); }
  .feedback-actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }

  /* Generating state */
  .generating {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 0;
    color: var(--muted);
    font-size: 12px;
  }
  .dots { display: flex; gap: 4px; }
  .dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: blink 1.2s ease-in-out infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  /* Error */
  .error-msg { font-size: 12px; color: var(--red); padding: 10px 0; }

  /* Empty state */
  .empty-card {
    padding: 12px 20px 16px;
    color: var(--muted);
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .product-card-header { flex-direction: column; }
    .product-actions { width: 100%; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .site-header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="shell">

  <header class="site-header">
    <div>
      <div class="logo-row">
        <div class="logo-mark">D</div>
        <div>
          <div class="site-title">Prompt Repository</div>
          <div class="site-sub">TikTok Shop · Higgsfield + Grok · Deep-dive videos</div>
        </div>
      </div>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat-tile"><div class="stat-label">Generated</div><div class="stat-val" id="stat-gen">0</div></div>
    <div class="stat-tile s-approved"><div class="stat-label">Approved</div><div class="stat-val" id="stat-app">0</div></div>
    <div class="stat-tile s-rejected"><div class="stat-label">Rejected</div><div class="stat-val" id="stat-rej">0</div></div>
    <div class="stat-tile s-inprog"><div class="stat-label">In progress</div><div class="stat-val" id="stat-prog">0</div></div>
  </div>

  <div class="section-label">Products</div>
  <div class="product-grid" id="product-grid"></div>

</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const API_KEY = 'YOUR_API_KEY_HERE'; // Replace before deploying
const STORAGE_KEY = 'dista_prompt_repo_v1';

// ─── PRODUCTS ─────────────────────────────────────────────────────────────────
const PRODUCTS = [
  { id:'p1', brand:'Pilgrim', name:'Advanced Hair Growth Serum (Dropper)', desc:'3% Redensyl, 4% Anagain, Korean Black Rice' },
  { id:'p2', brand:'Pilgrim', name:'Hair Growth Serum Roll-On', desc:'3% Redensyl, 4% Anagain, 5% Capilia Stem Cell Complex' },
  { id:'p3', brand:'Jolochip', name:'Last Chip Challenge', desc:'Carolina Reaper + Scorpion + Ghost Pepper · 2.2M Scoville · tortilla chip' },
  { id:'p4', brand:'Jolochip', name:'Hottest Chocolate Challenge', desc:'Skull-shaped bar · Carolina Reaper + Scorpion Pepper · 2.2M Scoville' },
  { id:'p5', brand:'ThriveCo', name:'Hair Growth Serum 2.0', desc:'REGENDIL™ (Redensyl + Procapil + Anagain + Capilia Longa) · 150% improvement in clinical study · Journal of Cosmetic Dermatology' },
  { id:'p6', brand:'The Derma Co', name:'15% Vitamin C Intense Brightening Ampoule Kit', desc:'15% L-Ascorbic Acid · individually sealed glass ampoules · clinically tested' },
  { id:'p7', brand:'The Derma Co', name:'3000 PPM Retinol Microneedle Serum Shot', desc:'Needle-like spicules from marine sponges · 5x deeper penetration · Squalane + Panthenol + Hyaluronic Acid' },
  { id:'p8', brand:'Reginald', name:'Helios Men Sunscreen SPF 50 PA++++', desc:'USFDA registered · dermatologically tested · Niacinamide + Centella Asiatica + Hyaluronic Acid · zero white cast' }
];

// ─── STATE ───────────────────────────────────────────────────────────────────
let state = { videos: {} };

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) state = JSON.parse(saved);
  } catch(e) { console.warn('Could not load saved state:', e); }
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e) { console.warn('Could not save state:', e); }
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function updateStats() {
  let app=0, rej=0, prog=0;
  Object.values(state.videos).forEach(v => {
    if (v.status === 'approved') app++;
    else if (v.status === 'rejected') rej++;
    else if (v.status === 'in-progress') prog++;
  });
  document.getElementById('stat-gen').textContent = Object.keys(state.videos).length;
  document.getElementById('stat-app').textContent = app;
  document.getElementById('stat-rej').textContent = rej;
  document.getElementById('stat-prog').textContent = prog;
}

// ─── PROMPT BUILDER ───────────────────────────────────────────────────────────
function buildPrompt(product, experimental, rejectionContext='') {
  return `You are a TikTok Shop video prompt writer for an Indian beauty/food brand (Dista) selling on TikTok US.

Product: ${product.name} by ${product.brand}
Key details: ${product.desc}

${rejectionContext ? `CONTEXT — Previous version was rejected. Team feedback: "${rejectionContext}". Address this specifically in your revision.` : ''}

Generate a ${experimental ? 'CRAZY EXPERIMENTAL TikTok-style' : 'deep-dive product'} multi-scene video using Higgsfield AI + Grok.

RULES:
- Every scene must feature or directly reference this specific product — no generic scenes
- Decide the ideal number of scenes (3–5) based on what the format needs
- Each scene = one standalone Grok/Higgsfield video generation prompt
- For each scene choose the best mode: "UGC Factory" (AI character presenting product) or "Cinematic" (product-focused visual)
- Prompts must be highly visual and specific — describe exact setting, lighting, character action, camera movement, product placement
- No medical claims. No "cures", "treats", "prevents" language
- Hair/beauty safe language: "clinically studied ingredients", "supports hair density", "promotes stronger hair", "visible glow", "supports skin renewal"
- Jolochip: include "Extremely spicy — consume responsibly" in at least one scene's overlay text note
- ThriveCo "150% improvement" claim: always note "In a clinical study — results may vary" in overlay
- No competitor brand mentions or attacks
- No beauty filters on skin/hair demos
${experimental
  ? '- EXPERIMENTAL format: chaotic energy, viral hook, meme-worthy, high-speed cuts, trend-driven. Think unhinged in the best way. Surprise the viewer in the first 2 seconds.'
  : '- Standard format: educational, storytelling, lifestyle, or ingredient deep-dive. Compelling and TikTok-native but compliant.'}

Pick a creative, specific FORMAT NAME (e.g. "Ingredient origin story", "60-second ritual", "The heat test", "Shelf life check", etc.)

Respond ONLY with valid JSON — no markdown, no preamble:
{
  "format": "Your format name",
  "scenes": [
    {
      "mode": "UGC Factory",
      "prompt": "Full detailed Higgsfield/Grok generation prompt for this scene"
    }
  ]
}`;
}

// ─── API CALL ─────────────────────────────────────────────────────────────────
async function callClaude(prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1500,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!res.ok) throw new Error(`API error: ${res.status}`);
  const data = await res.json();
  const text = data.content.map(c => c.text || '').join('');
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

// ─── COPY ─────────────────────────────────────────────────────────────────────
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy prompt'; btn.classList.remove('copied'); }, 1800);
  });
}

// ─── STATUS BADGE ─────────────────────────────────────────────────────────────
function statusBadge(s) {
  const map = { draft:'badge-draft', approved:'badge-approved', rejected:'badge-rejected', 'in-progress':'badge-inprog' };
  const labels = { draft:'Draft', approved:'Approved', rejected:'Rejected', 'in-progress':'In progress' };
  return `<span class="badge ${map[s]||'badge-draft'}" id="status-badge-${s}">${labels[s]||s}</span>`;
}

// ─── RENDER SCENES ────────────────────────────────────────────────────────────
function renderScenes(scenes) {
  return scenes.map((sc, i) => `
    <div class="scene-block">
      <div class="scene-header">
        <span class="scene-num">Scene ${i+1}</span>
        <span class="scene-mode-pill">${sc.mode}</span>
      </div>
      <div class="scene-prompt">${escapeHtml(sc.prompt)}</div>
      <button class="btn-copy" onclick="copyText(${JSON.stringify(sc.prompt)}, this)">Copy prompt</button>
    </div>
  `).join('');
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── RENDER VIDEO BLOCK ───────────────────────────────────────────────────────
function renderVideoBlock(vid, vidKey) {
  return `
    <div class="video-block${vid.experimental?' experimental':''}" id="vb-${vidKey}">
      <div class="video-top">
        <div class="video-format">${escapeHtml(vid.format)}</div>
        <div class="badges">
          ${vid.experimental ? '<span class="badge badge-exp">Experimental</span>' : ''}
          <span class="badge ${statusClass(vid.status)}" id="sbadge-${vidKey}">${statusLabel(vid.status)}</span>
        </div>
      </div>
      <div class="status-row">
        <select onchange="setStatus('${vidKey}', this.value)">
          <option value="draft"${vid.status==='draft'?' selected':''}>Draft</option>
          <option value="in-progress"${vid.status==='in-progress'?' selected':''}>In progress</option>
          <option value="approved"${vid.status==='approved'?' selected':''}>Approved</option>
          <option value="rejected"${vid.status==='rejected'?' selected':''}>Rejected</option>
        </select>
      </div>
      <div class="scenes-list" id="scenes-${vidKey}">${renderScenes(vid.scenes)}</div>
      <div class="feedback-section">
        <div class="feedback-label">Team feedback</div>
        <textarea id="fb-${vidKey}" placeholder="Describe what to change, why it doesn't work, or what you'd like differently...">${escapeHtml(vid.feedback||'')}</textarea>
        <div class="feedback-actions">
          <button class="btn-approve" onclick="approveVideo('${vidKey}')">Approve</button>
          <button class="btn-reject" onclick="rejectVideo('${vidKey}')">Reject</button>
          <button class="btn-regen" onclick="regenVideo('${vidKey}')">Regen from feedback</button>
        </div>
      </div>
    </div>
  `;
}

function statusClass(s) {
  return { draft:'badge-draft', approved:'badge-approved', rejected:'badge-rejected', 'in-progress':'badge-inprog' }[s] || 'badge-draft';
}
function statusLabel(s) {
  return { draft:'Draft', approved:'Approved', rejected:'Rejected', 'in-progress':'In progress' }[s] || s;
}

// ─── STATUS ACTIONS ───────────────────────────────────────────────────────────
function setStatus(vidKey, status) {
  state.videos[vidKey].status = status;
  const badge = document.getElementById(`sbadge-${vidKey}`);
  if (badge) { badge.className = `badge ${statusClass(status)}`; badge.textContent = statusLabel(status); }
  saveState(); updateStats();
}

function approveVideo(vidKey) {
  document.querySelector(`#vb-${vidKey} select`).value = 'approved';
  setStatus(vidKey, 'approved');
}

function rejectVideo(vidKey) {
  const fb = document.getElementById(`fb-${vidKey}`).value;
  state.videos[vidKey].feedback = fb;
  document.querySelector(`#vb-${vidKey} select`).value = 'rejected';
  setStatus(vidKey, 'rejected');
  saveState();
}

async function regenVideo(vidKey) {
  const fb = document.getElementById(`fb-${vidKey}`).value.trim();
  if (!fb) { alert('Please write feedback first — explain what to change so Claude can improve it.'); return; }
  const vid = state.videos[vidKey];
  const product = PRODUCTS.find(p => p.id === vid.productId);
  const scenesEl = document.getElementById(`scenes-${vidKey}`);
  const regenBtn = document.querySelector(`#vb-${vidKey} .btn-regen`);
  regenBtn.disabled = true;
  scenesEl.innerHTML = `<div class="generating"><div class="dots"><span></span><span></span><span></span></div> Regenerating based on feedback...</div>`;
  try {
    const parsed = await callClaude(buildPrompt(product, vid.experimental, fb));
    vid.scenes = parsed.scenes;
    vid.format = parsed.format;
    vid.status = 'draft';
    vid.feedback = fb;
    state.videos[vidKey] = vid;
    saveState();
    scenesEl.innerHTML = renderScenes(vid.scenes);
    document.querySelector(`#vb-${vidKey} .video-format`).textContent = vid.format;
    document.querySelector(`#vb-${vidKey} select`).value = 'draft';
    const badge = document.getElementById(`sbadge-${vidKey}`);
    if (badge) { badge.className = 'badge badge-draft'; badge.textContent = 'Draft'; }
    updateStats();
  } catch(e) {
    scenesEl.innerHTML = `<div class="error-msg">Generation failed: ${e.message}. Check your API key and try again.</div>`;
  }
  regenBtn.disabled = false;
}

// ─── GENERATE VIDEO ───────────────────────────────────────────────────────────
async function generateVideo(productId, experimental) {
  const product = PRODUCTS.find(p => p.id === productId);
  const card = document.getElementById(`card-${productId}`);
  const videosList = document.getElementById(`vlist-${productId}`);
  const btn = card.querySelector(experimental ? '.btn-exp' : '.btn-gen');
  const origLabel = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Generating...';

  const placeholder = document.createElement('div');
  placeholder.className = 'video-block';
  placeholder.innerHTML = `<div class="generating"><div class="dots"><span></span><span></span><span></span></div> Crafting ${experimental ? 'experimental' : 'deep-dive'} prompts for ${product.name}...</div>`;
  videosList.appendChild(placeholder);
  card.classList.add('has-videos');

  try {
    const parsed = await callClaude(buildPrompt(product, experimental));
    const vidKey = `${productId}-${Date.now()}`;
    const vid = {
      productId,
      format: parsed.format,
      scenes: parsed.scenes,
      experimental,
      status: 'draft',
      feedback: ''
    };
    state.videos[vidKey] = vid;
    saveState();
    placeholder.outerHTML = renderVideoBlock(vid, vidKey);
    updateStats();
  } catch(e) {
    placeholder.innerHTML = `<div class="error-msg">Failed: ${e.message}. Check API key or try again.</div>`;
  }

  btn.disabled = false;
  btn.textContent = origLabel;
}

// ─── RENDER PRODUCTS ──────────────────────────────────────────────────────────
function renderProducts() {
  const grid = document.getElementById('product-grid');
  grid.innerHTML = PRODUCTS.map(p => {
    const existingVideos = Object.entries(state.videos)
      .filter(([,v]) => v.productId === p.id)
      .map(([k,v]) => renderVideoBlock(v, k))
      .join('');

    return `
      <div class="product-card${existingVideos ? ' has-videos' : ''}" id="card-${p.id}">
        <div class="product-card-header">
          <div>
            <div class="product-brand">${p.brand}</div>
            <div class="product-name">${p.name}</div>
            <div class="product-desc">${p.desc}</div>
          </div>
          <div class="product-actions">
            <button class="btn-gen" onclick="generateVideo('${p.id}', false)">Generate video</button>
            <button class="btn-exp" onclick="generateVideo('${p.id}', true)">Generate experimental</button>
          </div>
        </div>
        <div class="videos-list" id="vlist-${p.id}">
          ${existingVideos || `<div class="empty-card">No videos yet — click generate to start</div>`}
        </div>
      </div>
    `;
  }).join('');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadState();
renderProducts();
updateStats();
</script>
</body>
</html>
